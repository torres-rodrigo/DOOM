#!/hint/bash
# shellcheck disable=2034
#
# ~/.config/pacman/makepkg.conf
# User-level makepkg overrides (XDG, pacman 6.1+).
# Applied to all AUR builds run as this user.

# ── Architecture ──────────────────────────────────────────────────────────────
CARCH="x86_64"
CHOST="x86_64-pc-linux-gnu"

# ── Compiler flags ────────────────────────────────────────────────────────────
# -march=native  : enable instruction sets specific to this CPU (AVX2, etc.)
# -O2            : strong optimization without the cache-busting bloat of -O3
# Security flags kept: FORTIFY_SOURCE, stack-clash, format hardening
CFLAGS="-march=native -O2 -pipe -fno-plt -fexceptions \
        -Wp,-D_FORTIFY_SOURCE=3 -Wformat -Werror=format-security \
        -fstack-clash-protection -fcf-protection"
CXXFLAGS="$CFLAGS -Wp,-D_GLIBCXX_ASSERTIONS"

# ── Linker & parallelism ──────────────────────────────────────────────────────
# mold           : modern linker — massively faster than GNU ld for large packages
# -l$(nproc)     : load cap — stops spawning jobs if CPU load exceeds core count
#                  (prevents OOM panics during LTO linking)
LDFLAGS="-Wl,-O1 -Wl,--sort-common -Wl,--as-needed -Wl,-z,relro -Wl,-z,now \
         -Wl,-z,pack-relative-relocs -fuse-ld=mold"
LTOFLAGS="-flto=auto"
MAKEFLAGS="-j$(nproc) -l$(nproc)"
NINJAFLAGS="-j$(nproc)"

# Rust: route Rust builds through mold as well (paru and mangowc-git are Rust)
RUSTFLAGS="-C link-arg=-fuse-ld=mold"

# ── Build options ─────────────────────────────────────────────────────────────
# !debug    : skip building a separate debug package — wasteful for local installs
# !autodeps : skip dep-scanning at build end — not needed when installing locally
OPTIONS=(strip docs !libtool !staticlibs emptydirs zipman purge !debug lto !autodeps)

# ── Compression ───────────────────────────────────────────────────────────────
# -T0 : use all threads — fast for local packages you install and delete immediately
COMPRESSGZ=(gzip -c -f -n)
COMPRESSBZ2=(bzip2 -c -f)
COMPRESSXZ=(xz -c -z -)
COMPRESSZST=(zstd -c -T0 -)
COMPRESSLRZ=(lrzip -q)
COMPRESSLZO=(lzop -q)
COMPRESSZ=(compress -c -f)
COMPRESSLZ4=(lz4 -q)
COMPRESSLZ=(lzip -c -f)

PKGEXT='.pkg.tar.zst'
SRCEXT='.src.tar.gz'
