# =============================================================================
# Mango WM — config.conf
# =============================================================================

# ── Exec ─────────────────────────────────────────────────────────────────────
exec-once = swaybg -i ~/Pictures/field_cartoon_up.png &

# ── Cursor ───────────────────────────────────────────────────────────────────
cursor_theme=DoomCursor
cursor_size=32

# ── Gaps & Borders ───────────────────────────────────────────────────────────
gappih=0
gappiv=0
gappoh=0
gappov=0

borderpx=1
no_border_when_single=1
smartgaps=1

bordercolor=0x000000ff
focuscolor=0x666666ff

# ── Layout ───────────────────────────────────────────────────────────────────
new_is_master=0
default_mfact=0.50
drag_tile_to_tile=1

# ── Behavior ─────────────────────────────────────────────────────────────────
sloppyfocus=1
warpcursor=0
animations=0
enable_hotarea=0

# ── Input ────────────────────────────────────────────────────────────────────
xkb_rules_options=caps:escape
numlockon=1

# ── Window Rules ─────────────────────────────────────────────────────────────

# GTK file chooser portal — covers Open/Save dialogs from most GTK apps
windowrule=isfloating:1,appid:xdg-desktop-portal-gtk

# High-confidence dialog titles — anchored regex so "Open" won't match
# window titles that merely contain the word
windowrule=isfloating:1,title:^(Open|Open File|Open Files|Save|Save As|Save File|Export|Export As|Print|Properties|About)$

# ── Bindings ─────────────────────────────────────────────────────────────────

# ── System ───────────────────────────────────────────────────────────────────
bind=SUPER+SHIFT,m,quit
bind=CTRL+SHIFT,R,reload_config

# ── Launch ───────────────────────────────────────────────────────────────────
bind=SUPER,Return,spawn,wezterm
bind=SUPER,KP_Enter,spawn,wezterm
bind=SUPER,Space,spawn,rofi -show drun
bind=SUPER,w,spawn,firefox

# ── Media ────────────────────────────────────────────────────────────────────
bind=SUPER+ALT,Left,spawn,pactl set-sink-volume @DEFAULT_SINK@ -5%
bind=SUPER+ALT,Right,spawn,pactl set-sink-volume @DEFAULT_SINK@ +5%
bind=SUPER+ALT,Up,spawn,brightnessctl set +5%
bind=SUPER+ALT,Down,spawn,brightnessctl set 5%-

# ── Window ───────────────────────────────────────────────────────────────────
bind=SUPER,q,killclient
bind=SUPER+SHIFT,f,togglefullscreen
bind=SUPER,f,togglefloating
bind=SUPER,t,setlayout,tile

# ── Layouts ──────────────────────────────────────────────────────────────────
bind=SUPER+ALT,q,setlayout,tile
bind=SUPER+ALT,w,setlayout,scroller
bind=SUPER+ALT,e,setlayout,monocle
bind=SUPER+ALT,r,setlayout,grid
bind=SUPER+ALT,t,setlayout,deck
bind=SUPER+ALT,y,setlayout,center_tile
bind=SUPER+ALT,u,setlayout,vertical_tile
bind=SUPER+ALT,i,setlayout,right_tile
bind=SUPER+ALT,o,setlayout,vertical_scroller
bind=SUPER+ALT,p,setlayout,vertical_grid
bind=SUPER+ALT,bracketleft,setlayout,vertical_deck
bind=SUPER+ALT,bracketright,setlayout,tgmix

# ── Default Layouts ──────────────────────────────────────────────────────────
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# ── Scroller Layout Settings ─────────────────────────────────────────────────
scroller_ignore_proportion_single=0
scroller_default_proportion_single=1.0
scroller_default_proportion=0.9
scroller_structs=10
scroller_prefer_overspread=0
scroller_focus_center=0
scroller_prefer_center=1

# ── Focus ────────────────────────────────────────────────────────────────────
# switch window focus
bind=SUPER,j,focusstack,next
bind=SUPER,k,focusstack,prev
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,m,zoom
bind=SUPER,Tab,focuslast

# ── Swap ─────────────────────────────────────────────────────────────────────
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right

# smartmovewin
# bind=CTRL+SHIFT,k,smartmovewin,up
# bind=CTRL+SHIFT,j,smartmovewin,down
# bind=CTRL+SHIFT,h,smartmovewin,left
# bind=CTRL+SHIFT,l,smartmovewin,right

# ── Resize ───────────────────────────────────────────────────────────────────
bind=SUPER+CTRL,h,setmfact,-0.05
bind=SUPER+CTRL,l,setmfact,+0.05

bind=SUPER+ALT,h,resizewin,-5,0
bind=SUPER+ALT,l,resizewin,5,0
bind=SUPER+ALT,j,resizewin,0,5
bind=SUPER+ALT,k,resizewin,0,-5

# ── Mouse ────────────────────────────────────────────────────────────────────
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

axisbind=SUPER,DOWN,focusstack,next
axisbind=SUPER,UP,focusstack,prev
axisbind=SUPER+CTRL,DOWN,viewtoright
axisbind=SUPER+CTRL,UP,viewtoleft

# ── Overview ─────────────────────────────────────────────────────────────────
bind=SUPER,0,toggleoverview

# ── Workspaces (view) ────────────────────────────────────────────────────────
bind=SUPER,1,comboview,1
bind=SUPER,2,comboview,2
bind=SUPER,3,comboview,3
bind=SUPER,4,comboview,4
bind=SUPER,5,comboview,5
bind=SUPER,6,comboview,6
bind=SUPER,7,comboview,7
bind=SUPER,8,comboview,8
bind=SUPER,9,comboview,9

# ── Workspaces Send Silent ───────────────────────────────────────────────────
bind=SUPER+SHIFT,1,tagsilent,1
bind=SUPER+SHIFT,2,tagsilent,2
bind=SUPER+SHIFT,3,tagsilent,3
bind=SUPER+SHIFT,4,tagsilent,4
bind=SUPER+SHIFT,5,tagsilent,5
bind=SUPER+SHIFT,6,tagsilent,6
bind=SUPER+SHIFT,7,tagsilent,7
bind=SUPER+SHIFT,8,tagsilent,8
bind=SUPER+SHIFT,9,tagsilent,9

# ── Workspaces Send and Follow ───────────────────────────────────────────────
bind=SUPER+ALT,1,tag,1
bind=SUPER+ALT,2,tag,2
bind=SUPER+ALT,3,tag,3
bind=SUPER+ALT,4,tag,4
bind=SUPER+ALT,5,tag,5
bind=SUPER+ALT,6,tag,6
bind=SUPER+ALT,7,tag,7
bind=SUPER+ALT,8,tag,8
bind=SUPER+ALT,9,tag,9

# ── Scratchpads ──────────────────────────────────────────────────────────────


# ── Gestures ─────────────────────────────────────────────────────────────────
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down

gesturebind=none,left,4,viewtoleft_have_client
gesturebind=none,right,4,viewtoright_have_client
gesturebind=none,up,4,toggleoverview
gesturebind=none,down,4,toggleoverview

disable_trackpad=0
tap_to_click=1
tap_and_drag=1
trackpad_natural_scrolling=0
scroll_method=1
click_method=2
drag_lock=0
swipe_min_threshold=1
