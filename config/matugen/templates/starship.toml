# Starship prompt — Generated by Matugen

palette = 'matugen'

format = """\
[╭─](bold muted)[ᚱ](bold accent) $directory\
$git_branch\
$git_status\
$fill\
$cmd_duration
[╰──](bold muted)$character"""

[palettes.matugen]
accent = '{{colors.error.default.hex}}'
muted  = '{{colors.outline_variant.default.hex}}'
dir    = '{{colors.primary.default.hex}}'
branch = '{{colors.secondary.default.hex}}'

[directory]
truncation_length = 0
truncate_to_repo = false
style = "bold dir"

[git_branch]
format = '$symbol[$branch]($style) '
style = "bold branch"

[git_status]
format = '([$ahead_behind$all_status]($style) )'
ahead = '[⇡${count}](bold yellow) '
behind = '[⇣${count}](bold red) '
diverged = '[⇕⇡${ahead_count}⇣${behind_count}](bold red) '
up_to_date = '[](bold green) '
conflicted = '[](bold red) '
deleted = '[---${count}](bold red) '
modified = '[!!${count}](bold red) '
renamed = '[»»${count}](bold blue) '
staged = '[+++${count}](bold green) '
untracked = '[?${count}](bold red) '
stashed = '[§${count}](bold yellow) '
style = 'bold white'

[fill]
symbol = ' '

[cmd_duration]
min_time = 250
show_milliseconds = true
format = 'took [󱦟 $duration]($style) '

[character]
error_symbol = "[❯](bold green)"
success_symbol = "[❯](bold green)"
