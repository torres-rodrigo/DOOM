#? Config file for btop

#* Name of a btop++/bpytop/bashtop formatted ".theme" file, "Default" and "TTY" for builtin themes.
#* Themes should be placed in "../share/btop/themes" relative to binary or "$HOME/.config/btop/themes"
color_theme = "matugen"

#* If the theme set background should be shown, set to False if you want terminal background transparency.
theme_background = False

#* Sets if 24-bit truecolor should be used, will convert 24-bit colors to 256 color (6x6x6 color cube) if false.
truecolor = True

#* Set to true to force tty mode regardless if a real tty has been detected or not.
force_tty = False

#* Define presets for the layout of the boxes.
presets = "cpu:1:default,proc:0:default cpu:0:default,mem:0:default,net:0:default"

#* Set to True to enable "h,j,k,l,g,G" keys for directional control in lists.
vim_keys = True

#* Rounded corners on boxes, is ignored if TTY mode is ON.
rounded_corners = True

#* Default symbols to use for graph creation, "braille", "block" or "tty"
graph_symbol = "braille"

#* Graph symbol to use for the cpu box, "default", "braille", "block" or "tty"
graph_symbol_cpu = "default"

#* Graph symbol to use for the mem box, "default", "braille", "block" or "tty"
graph_symbol_mem = "default"

#* Graph symbol to use for the net box, "default", "braille", "block" or "tty"
graph_symbol_net = "default"

#* Graph symbol to use for the proc box, "default", "braille", "block" or "tty"
graph_symbol_proc = "default"

#* Manually set which boxes to show. Available values are "cpu mem net proc" and "gpu0" through "gpu5", separate values with whitespace.
shown_boxes = "cpu mem net proc"

#* Update time in milliseconds, recommended 2000 ms or above for better sample times for graphs.
update_ms = 2000

#* Processes sorting, "pid" "program" "arguments" "threads" "user" "memory" "cpu lazy" "cpu responsive"
proc_sorting = "cpu lazy"

#* Reverse sorting order, True or False.
proc_reversed = False

#* Show processes as a tree.
proc_tree = False

#* Use the cpu graph colors in the process list.
proc_colors = True

#* Use a darkening gradient in the process list.
proc_gradient = True

#* If process cpu usage should be of the core it's running on or usage of the total available cpu power.
proc_per_core = False

#* Show process memory as bytes instead of percent.
proc_mem_bytes = True

#* Show cpu graph for each individual cpu core.
cpu_graph_upper = "total"
cpu_graph_lower = "used"

#* Toggles if the cpu box should be shown, set to 0 to disable.
cpu_single_graph = False

#* Show running processes in the cpu box.
cpu_invert_lower = True

#* Set to true to disable the lower graph when cpu_single_graph is true.
cpu_single_graph_lower = False

#* Show battery stats in the cpu box (if battery is present).
show_battery = True
selected_battery = "Auto"
show_battery_watts = True

#* Set to true to show init PID in the process list.
show_init = False

#* Show cpu frequency. False if not available.
show_cpu_freq = True

#* Draw a clock in the upper right corner.
clock_format = "%H:%M"

#* Update main ui in background when menus are showing, set this to false if the menus is flickering too much.
background_update = True

#* Custom cpu model name, empty string to disable.
custom_cpu_name = ""

#* Optional filter for shown disks, comma separated list of mount points, "root" to show just root.
disks_filter = ""

#* Show graphs instead of meters for memory values.
mem_graphs = True

#* Show mem box below net box instead of below cpu box.
mem_below_net = False

#* Count ZFS ARC in cached and available memory.
zfs_arc_cached = True

#* If swap memory should be shown in the mem box.
show_swap = True

#* Show swap as a disk, ignoring the above setting.
swap_disk = True

#* If mem box should be split to also show disks info.
show_disks = True

#* Filter out non-physical disks. Set this to False to include network disks, RAM disks and similar.
only_physical = True

#* Read disks info every 30 update instead of every update (Recommended to preseve disk life and performance).
use_fstab = False

#* Toggles if the disks io graphs should be displayed.
disk_free_prct = False

#* Set the top network graph to use max flow rate of a network interface (in Mbit), 0 for auto.
net_download = 100
net_upload = 100

#* Use network interface with the highest traffic for the chart.
net_auto = True

#* Sync the graph scaling to full bandwidth.
net_sync = False

#* Starts with the Network Interface specified here.
net_iface = ""

#* Show battery stats in the cpu box (if battery is present).
show_battery = True
