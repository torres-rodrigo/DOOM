# Hyprland Autostart Configuration
# Applications and services to run on Hyprland startup

# Set cursor theme for Hyprland
exec-once = hyprctl setcursor Bibata-Modern-Ice 24

# Import environment variables to systemd and dbus
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment

# Clipboard Management
exec-once = wl-clip-persist --clipboard regular &
exec-once = wl-paste --watch cliphist store

# Authentication Agent (for GUI sudo prompts - polkit)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Idle Management (screen lock, sleep, dim, etc.)
exec-once = hypridle
